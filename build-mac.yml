name: Build macOS App

on:
  # شغّله يدوياً من GitHub
  workflow_dispatch:

  # أو تلقائياً لما تعمل Release
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    name: Build ClickBulk.app
    runs-on: macos-latest

    steps:
      # ── 1. Checkout الكود ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Cache pip packages (بيوفر وقت في كل build) ───────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 5. Convert Logo3.png → icon.icns ─────────────────────────────────
      - name: Create icon.icns from Logo3.png
        run: |
          LOGO="src/clickbulk/resources/icons/Logo3.png"
          ICNS="src/clickbulk/resources/icons/icon.icns"

          # Fallback to logo.png
          [ ! -f "$LOGO" ] && LOGO="src/clickbulk/resources/icons/logo.png"

          ICONSET="$(mktemp -d)/ClickBulk.iconset"
          mkdir -p "$ICONSET"

          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE "$LOGO" --out "$ICONSET/icon_${SIZE}x${SIZE}.png"
            DOUBLE=$((SIZE * 2))
            sips -z $DOUBLE $DOUBLE "$LOGO" --out "$ICONSET/icon_${SIZE}x${SIZE}@2x.png"
          done

          iconutil -c icns "$ICONSET" -o "$ICNS"
          echo "icon.icns created ✅"

      # ── 6. Build .app ─────────────────────────────────────────────────────
      - name: Build ClickBulk.app with PyInstaller
        run: |
          pyinstaller ClickBulk-mac.spec --noconfirm

      # ── 7. Inject icon + refresh bundle ──────────────────────────────────
      - name: Inject icon into app bundle
        run: |
          ICNS="src/clickbulk/resources/icons/icon.icns"
          if [ -f "$ICNS" ]; then
            cp "$ICNS" "dist/ClickBulk.app/Contents/Resources/icon.icns"
            touch "dist/ClickBulk.app"
            echo "Icon injected ✅"
          fi

      # ── 8. Zip the .app ───────────────────────────────────────────────────
      - name: Create distributable zip
        run: |
          cd dist
          zip -r ClickBulk-mac.zip ClickBulk.app -x "*.DS_Store"
          echo "Zip created ✅"
          ls -lh ClickBulk-mac.zip

      # ── 9. Upload as GitHub Artifact ──────────────────────────────────────
      - name: Upload ClickBulk-mac.zip
        uses: actions/upload-artifact@v4
        with:
          name: ClickBulk-mac
          path: dist/ClickBulk-mac.zip
          retention-days: 30

      # ── 10. لو push tag → اعمل GitHub Release تلقائي ────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ClickBulk-mac.zip
          name: "ClickBulk ${{ github.ref_name }} — macOS"
          body: |
            ## ClickBulk for macOS ${{ github.ref_name }}

            ### Installation
            1. Download `ClickBulk-mac.zip`
            2. Extract → drag `ClickBulk.app` to Applications
            3. Double-click to run

            > First launch: Right-click → Open (to bypass Gatekeeper)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
